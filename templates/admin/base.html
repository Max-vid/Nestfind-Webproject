{% extends 'base.html' %}
{% block content %}
<div class="admin-shell">
  <nav class="admin-sidebar">
    <div class="as-brand">⚙️ Admin Panel</div>
    <a href="/admin/dashboard" class="as-link {% if request.path=='/admin/dashboard' %}on{% endif %}"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/admin/properties" class="as-link {% if '/admin/properties' in request.path %}on{% endif %}"><i class="fas fa-building"></i> Properties</a>
    <a href="/admin/users" class="as-link {% if '/admin/users' in request.path %}on{% endif %}"><i class="fas fa-users"></i> Users</a>
    <a href="/admin/analytics" class="as-link {% if '/admin/analytics' in request.path %}on{% endif %}"><i class="fas fa-chart-bar"></i> Analytics</a>
    <div style="flex:1"></div>
    <a href="/" class="as-link"><i class="fas fa-globe"></i> Site</a>
    <a href="/logout" class="as-link danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>
  <div class="admin-body">{% block admin_content %}{% endblock %}</div>
</div>
{% endblock %}
