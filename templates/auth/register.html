{% extends 'base.html' %}
{% block title %}Register — NestFind{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="brand-mark">N</div><span class="brand-name">NestFind</span></div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join thousands of tenants and owners</p>
    <form method="POST" class="auth-form">
      <div class="fg"><label>Full Name</label>
        <div class="input-icon"><i class="fas fa-user"></i>
          <input type="text" name="name" placeholder="Your full name" required>
        </div>
      </div>
      <div class="fg"><label>Email</label>
        <div class="input-icon"><i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="fg"><label>Password</label>
        <div class="input-icon"><i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Minimum 8 characters" required>
        </div>
      </div>
      <div class="fg"><label>I am registering as a...</label>
        <div class="role-row">
          <label class="role-card"><input type="radio" name="role" value="tenant" checked>
            <span><i class="fas fa-search"></i><strong>Tenant</strong><small>Looking for a rental</small></span></label>
          <label class="role-card"><input type="radio" name="role" value="owner">
            <span><i class="fas fa-home"></i><strong>Owner</strong><small>Listing my property</small></span></label>
        </div>
      </div>
      <button type="submit" class="auth-submit">Create Account</button>
    </form>
    <p class="auth-switch">Already registered? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}
