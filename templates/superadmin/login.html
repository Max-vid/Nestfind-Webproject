<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Super Admin Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0D1B35;font-family:system-ui,sans-serif;}
.box{background:#1a2d50;border-radius:16px;padding:2.5rem;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo-icon{width:52px;height:52px;background:#E8743B;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;color:white;margin-bottom:.5rem;}
.logo h1{color:white;font-size:1.4rem;margin:.3rem 0 .2rem;}
.logo p{color:rgba(255,255,255,0.45);font-size:.82rem;}
.badge{background:rgba(232,116,59,0.15);border:1px solid rgba(232,116,59,0.3);color:#f0a070;border-radius:50px;padding:.3rem 1rem;font-size:.75rem;font-weight:700;letter-spacing:1px;text-align:center;display:block;margin-bottom:1.5rem;}
label{display:block;color:rgba(255,255,255,0.6);font-size:.82rem;font-weight:600;margin-bottom:.4rem;margin-top:.9rem;}
input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-size:.95rem;outline:none;transition:.2s;font-family:inherit;}
input:focus{border-color:#E8743B;background:rgba(232,116,59,0.08);}
button{width:100%;margin-top:1.4rem;padding:.85rem;background:#E8743B;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}
button:hover{background:#d4663a;}
.error{background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.35);color:#e74c3c;padding:.6rem .9rem;border-radius:8px;font-size:.85rem;margin-top:.8rem;}
.hint{color:rgba(255,255,255,0.3);font-size:.76rem;text-align:center;margin-top:1.2rem;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">N</div>
    <h1>NestFind</h1>
    <p>Restricted Access</p>
  </div>
  <span class="badge">🔐 SUPER ADMIN ONLY</span>
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="off" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Access Panel</button>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <p class="hint">All access is logged. Unauthorized access is prohibited.</p>
</div>
</body>
</html>
