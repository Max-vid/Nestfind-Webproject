<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}Super Admin{% endblock %} — NestFind</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1B35;font-family:'Plus Jakarta Sans',system-ui,sans-serif;display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sa-nav{background:#0A1628;padding:1.5rem 0;display:flex;flex-direction:column;gap:2px;}
.sa-brand{color:white;font-weight:800;font-size:1.05rem;padding:.5rem 1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.sa-lbl{padding:.8rem 1.4rem .2rem;font-size:.65rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.sa-lnk{display:flex;align-items:center;gap:.7rem;padding:.65rem 1.4rem;color:rgba(255,255,255,0.55);font-size:.87rem;font-weight:500;text-decoration:none;transition:.15s;}
.sa-lnk:hover,.sa-lnk.on{background:rgba(232,116,59,0.15);color:white;border-right:3px solid #E8743B;}
.sa-lnk.danger:hover{color:#e74c3c;background:rgba(192,57,43,0.15);border-right-color:#e74c3c;}
.sa-lnk i{width:15px;text-align:center;}
.sa-body{padding:2rem;overflow-y:auto;}
.sa-title{font-size:1.6rem;font-weight:800;color:white;margin-bottom:1.5rem;}
.sa-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem;margin-bottom:2rem;}
.sa-sc{background:#1B2A4A;border-radius:12px;padding:1.2rem;border-top:3px solid #E8743B;}
.sa-sc.b{border-top-color:#2E5FA3;}.sa-sc.g{border-top-color:#2D7A4F;}.sa-sc.r{border-top-color:#c0392b;}.sa-sc.y{border-top-color:#D68910;}
.sn{font-size:2rem;font-weight:800;color:white;}.sl{font-size:.72rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.5px;margin-top:.2rem;}
.sa-table-wrap{background:#1B2A4A;border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;}thead{background:#0A1628;}
th{padding:.8rem 1rem;text-align:left;font-size:.78rem;color:rgba(255,255,255,0.5);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
td{padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,0.05);font-size:.87rem;color:rgba(255,255,255,0.8);}
tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,0.02);}
.sa-badge{display:inline-block;padding:.2rem .55rem;border-radius:50px;font-size:.73rem;font-weight:700;}
.sa-badge.g{background:rgba(45,122,79,.2);color:#2ecc71;}.sa-badge.r{background:rgba(192,57,43,.2);color:#e74c3c;}.sa-badge.b{background:rgba(46,95,163,.2);color:#5dade2;}.sa-badge.y{background:rgba(214,137,16,.2);color:#f39c12;}
.sa-btn-block{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.25);padding:.32rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.sa-btn-unblock{background:rgba(45,122,79,.12);color:#2ecc71;border:1px solid rgba(45,122,79,.25);padding:.32rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.sa-btn-hide{background:rgba(214,137,16,.12);color:#f39c12;border:1px solid rgba(214,137,16,.25);padding:.32rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.sa-btn-verify{background:rgba(45,122,79,.12);color:#2ecc71;border:1px solid rgba(45,122,79,.25);padding:.32rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.sa-btn-remove{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.25);padding:.32rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.sa-filter-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.sa-filter-bar a{padding:.35rem .85rem;border-radius:50px;font-size:.8rem;color:rgba(255,255,255,0.5);text-decoration:none;border:1px solid rgba(255,255,255,0.1);}
.sa-filter-bar a.on,.sa-filter-bar a:hover{background:#E8743B;color:white;border-color:#E8743B;}
.sa-two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.sa-panel{background:#1B2A4A;border-radius:12px;padding:1.2rem;}
.sa-panel-title{color:white;font-size:.95rem;font-weight:700;margin-bottom:1rem;}
.sa-row{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.sa-row:last-child{border-bottom:none;}
.sa-row-t{color:white;font-size:.85rem;font-weight:600;}
.sa-row-s{font-size:.78rem;color:rgba(255,255,255,0.4);margin-top:.1rem;}
.toast-wrap{position:fixed;top:1rem;right:1rem;z-index:999;}
.sa-toast{background:#1B2A4A;border-left:3px solid #E8743B;padding:.6rem 1rem;border-radius:8px;color:white;font-size:.85rem;margin-bottom:.5rem;min-width:240px;}
.sa-toast.success{border-left-color:#2D7A4F;}.sa-toast.danger{border-left-color:#c0392b;}
.action-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
</style>
</head>
<body>
<nav class="sa-nav">
  <div class="sa-brand">⚙️ Super Admin Panel</div>
  <div class="sa-lbl">Main</div>
  <a href="/superadmin/dashboard" class="sa-lnk {% if request.path=='/superadmin/dashboard' %}on{% endif %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/superadmin/users" class="sa-lnk {% if '/superadmin/users' in request.path %}on{% endif %}"><i class="fas fa-users"></i> Manage Users</a>
  <a href="/superadmin/properties" class="sa-lnk {% if '/superadmin/properties' in request.path %}on{% endif %}"><i class="fas fa-building"></i> Manage Properties</a>
  <div style="flex:1"></div>
  <div class="sa-lbl">Account</div>
  <a href="/" class="sa-lnk"><i class="fas fa-home"></i> View Site</a>
  <a href="/superadmin/logout" class="sa-lnk danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
</nav>
<div class="sa-body">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}<div class="toast-wrap">{% for cat,msg in messages %}<div class="sa-toast {{ cat }}">{{ msg }}</div>{% endfor %}</div>{% endif %}
  {% endwith %}
  {% block sa_content %}{% endblock %}
</div>
</body>
</html>
